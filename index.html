<script>
/* ================= MAP ================= */
let map = L.map('map').setView([32.4279,53.6880],5);
let routeMode = false;
let osm = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png');

let osm2 = L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png');

let osm3 = L.tileLayer('https://{s}.tile.openstreetmap.de/{z}/{x}/{y}.png');
osm.addTo(map);
osm.on('tileerror', function(){

    map.removeLayer(osm);

    osm2.addTo(map);

    console.log("OSM1 failed");


});
window.updateUser = function(lat, lon){

    if(!window.map){
        console.log("Map not ready yet");
        return;
    }

    if(!window.userMarker){

        window.userMarker = L.circleMarker([lat, lon], {
            radius: 8,
            color: "#3498db",
            fillColor: "#3498db",
            fillOpacity: 0.9
        }).addTo(window.map);

    } else {

        window.userMarker.setLatLng([lat, lon]);

    }
};


osm2.on('tileerror', function(){

    map.removeLayer(osm2);

    osm3.addTo(map);

    console.log("OSM2 failed");

});

let sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

/* ================= LAYERS ================= */
document.getElementById("osm").onclick = ()=>{
    map.addLayer(osm);
    map.removeLayer(sat);
};

document.getElementById("sat").onclick = ()=>{
    map.addLayer(sat);
    map.removeLayer(osm);
};

/* ================= MARKER ================= */
let marker=null;


/* ================= SEARCH (FIXED) ================= */
function searchPlace(){

    let q=document.getElementById("searchInput").value;
    if(!q)return;

    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}`)
    .then(r=>r.json())
    .then(data=>{

        if(!data.length)return;

        let p=data[0];

        map.setView([p.lat,p.lon],12);

        if(marker) map.removeLayer(marker);marker=L.marker([p.lat,p.lon]).addTo(map)
        .bindPopup(p.display_name)
        .openPopup();
    });
}

document.getElementById("searchBtn").onclick=searchPlace;

/* ================= TOOLS PANEL ================= */
document.getElementById("toolsBtn").onclick=()=>{
    document.getElementById("toolsPanel").style.display="block";
};

document.getElementById("backBtn").onclick=()=>{
    document.getElementById("toolsPanel").style.display="none";
};

/* ================= PIN ================= */
let pinMode=false;

document.getElementById("pinMode").onclick=()=>{
    pinMode=!pinMode;
};

map.on("click",(e)=>{
    if(pinMode){
        if(marker) map.removeLayer(marker);
        marker=L.marker(e.latlng).addTo(map);
    }
});

/* ================= CLEAR ================= */
document.getElementById("clearPin").onclick=()=>{
    if(marker){
        map.removeLayer(marker);
        marker=null;
    }
};

/* ================= DRAW ================= */
let drawnItems=new L.FeatureGroup();
map.addLayer(drawnItems);

let drawControl=new L.Control.Draw({
    draw:{polyline:true,polygon:true,circle:false,rectangle:false,marker:false},
    edit:{featureGroup:drawnItems}
});

map.addControl(drawControl);

map.on(L.Draw.Event.CREATED,(e)=>{
    drawnItems.addLayer(e.layer);
});

/* ================= FLIGHT ================= */
let flightMap=null;
let flightLayer=null;

document.getElementById("flightBtn").onclick=()=>{

    document.getElementById("flightPanel").style.display="block";
    document.getElementById("toolsPanel").style.display="none";

    setTimeout(()=>{

        if(!flightMap){

            flightMap=L.map('flightMap').setView([20,0],2);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(flightMap);

            flightLayer=L.layerGroup().addTo(flightMap);

            loadFlights();

            setInterval(loadFlights,8000);
        }

        flightMap.invalidateSize();

    },200);
};

document.getElementById("flightBack").onclick=()=>{
    document.getElementById("flightPanel").style.display="none";
    document.getElementById("toolsPanel").style.display="block";
};

function loadFlights(){

    fetch("https://opensky-network.org/api/states/all")
    .then(r=>r.json())
    .then(data=>{

        if(!flightLayer) return;

        flightLayer.clearLayers();

        if(!data.states) return;

        data.states.forEach(s=>{

            let lat=s[6];
            let lon=s[5];

            if(lat&&lon){
                L.circleMarker([lat,lon],{
                    radius:3,
                    color:"yellow"
                }).addTo(flightLayer);
            }
        });
    })
    .catch(()=>{});
}

            el.innerText = Math.round(heading) + "°";

let tracking = false;
let watchId = null;

let userMarker = null;
let heading = 0;

let followUser = true;

let routeCoords = [];
let routeLine = null;

let lastLat = null;
let lastLon = null;

let destLat = null;
let destLon = null;

// 🧭 قطب‌نما (چرخش مثلث)
window.addEventListener("deviceorientation", function(e){
    heading = e.alpha || 0;

    const arrow = document.querySelector(".user-arrow");

    if(arrow){
        arrow.style.transform =
            "translateX(-50%) rotate(" + (-heading) + "deg)";
    }

});

// 📡 دکمه اصلی GPS
document.getElementById("liveCompassBtn").onclick = () => {

    tracking = !tracking;

    if(!tracking){

        if(watchId){
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
        }

        alert("📡 Tracking OFF");
        return;
    }

    if(!navigator.geolocation){
        alert("GPS not supported");
        return;
    }

    routeCoords = [];

    watchId = navigator.geolocation.watchPosition(

    (pos) => {

        let lat = pos.coords.latitude;
        let lon = pos.coords.longitude;

        console.log("GPS:", lat, lon);

        // 📍 ساخت یا آپدیت کاربر
        if(!userMarker){

            userMarker = L.marker([lat, lon], {

                icon: L.divIcon({
                    className: "user-icon",
                    html: `
                    <div class="user-dot">
                        <div class="user-arrow"></div>
                    </div>
                    `,
                    iconSize:[28,28]
                })

            }).addTo(map);

        } else {
            userMarker.setLatLng([lat, lon]);
        }

        // 🎯 Follow Me (مثل Google Maps)
        if(followUser){
            map.setView([lat, lon], map.getZoom(), {
                animate:true
            });
        }

        // 🟦 مسیر حرکت (Track)
        routeCoords.push([lat, lon]);

        if(routeLine){
            map.removeLayer(routeLine);
        }

        routeLine = L.polyline(routeCoords, {
            color: "blue",
            weight: 4
        }).addTo(map);

        // 🧭 جهت حرکت واقعی
        if(routeCoords.length > 2){

            let prev = routeCoords[routeCoords.length - 2];

            let angle = Math.atan2(
                lon - prev[1],
                lat - prev[0]
            ) * 180 / Math.PI;

            console.log("Direction:", angle);
        }

    },

    (err) => {
        alert("GPS error: " + err.message);
        console.log(err);
    },

    {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 15000
    });

    alert("📡 Tracking ON");
};


// 📍 Follow / Unfollow (Google Maps style)
function toggleFollow(){
    followUser = !followUser;
    alert(followUser ? "📍 Follow ON" : "🧭 Free Mode");
}
let generatedCode = "";
let savedPhone = "";

document.getElementById("loginBtn").onclick = () => {
    document.getElementById("loginPanel").style.display = "block";
};

document.getElementById("loginBack").onclick = () => {
    document.getElementById("loginPanel").style.display = "none";

/* ================= SEND CODE ================= */
document.getElementById("sendCodeBtn").onclick = () => {

    savedPhone = document.getElementById("phoneInput").value.trim();

    if(savedPhone === ""){
        alert("📱 Enter phone number");
        return;
    }

    generatedCode = Math.floor(100000 + Math.random() * 900000).toString();

    alert("📩 Your Code: " + generatedCode);
};

/* ================= LOGIN ================= */
document.getElementById("loginSubmitBtn").onclick = () => {

    let phone = document.getElementById("phoneInput").value.trim();
    let code = document.getElementById("codeInput").value.trim();

    // ❌ مرحله 1: شماره
    if(phone === ""){
        alert("📱 Phone is required");
        return;
    }

    // ❌ مرحله 2: ارسال کد
    if(generatedCode === ""){
        alert("📩 Please press Send Code first");
        return;
    }

    // ❌ مرحله 3: کد
    if(code === ""){
        alert("🔢 Enter code");
        return;
    }

    // ❌ اشتباه بودن کد
    if(code !== generatedCode){
        alert("❌ Wrong code");
        return;
    }

    // ✔ موفقیت
    document.getElementById("loginPanel").style.display = "none";

    let userData = {
        phone: phone
    };

    localStorage.setItem("user", JSON.stringify(userData));

    updateLoginUI();

    alert("Login success ✔");

    // reset code بعد از ورود
    generatedCode = "";
};

/* ================= UI ================= */
function updateLoginUI(){

    let user = JSON.parse(localStorage.getItem("user"));

    if(user){

        document.getElementById("loginBtn").innerText = user.phone;

        document.getElementById("loginBtn").onclick = () => {
            if(confirm("Logout?")){
                localStorage.removeItem("user");
                document.getElementById("loginBtn").innerText = "Login";
                location.reload();
            }
        };

    } else {
        document.getElementById("loginBtn").innerText = "Login";
    }
}

document.getElementById("startRoute").onclick = async () => {

    if(!startPoint || !endPoint){
        alert("Select start and destination");
        return;
    }

    let url = "https://api.openrouteservice.org/v2/directions/driving-car/geojson";

    let body = {
        coordinates: [
            [startPoint.lng, startPoint.lat],
            [endPoint.lng, endPoint.lat]
        ]
    };

    try{

        let res = await fetch(url, {
            method: "POST",
            headers: {
                "Authorization": API_KEY,
                "Content-Type": "application/json"
            },
            body: JSON.stringify(body)
        });

        let data = await res.json();

        let coords = data.features[0].geometry.coordinates;

        let latlngs = coords.map(c => [c[1], c[0]]);

        if(routeLine){
            map.removeLayer(routeLine);
        }

        routeLine = L.polyline(latlngs, {
            color: "blue",
            weight: 5
        }).addTo(map);

        map.fitBounds(routeLine.getBounds());

        document.getElementById("routeInfo").innerText =
            "Route loaded ✔";

    } catch(err){
        console.log(err);
        alert("Route failed");
    }

};
document.getElementById("resetRouteBtn").onclick = () => {

    startPoint = null;
    endPoint = null;

    if(routeLine){
        map.removeLayer(routeLine);
        routeLine = null;
    }

    document.getElementById("routeInfo").innerText =
    "Route cleared";

};
document.getElementById("resetRouteBtn").onclick = () => {

    startPoint = null;
    endPoint = null;

    // حذف مسیر خطی
    if(routeLine){
        map.removeLayer(routeLine);
        routeLine = null;
        
    }

    // حذف markerهای قبلی
    map.eachLayer(layer => {
        if(layer instanceof L.Marker){
            map.removeLayer(layer);
        }
    });

    document.getElementById("routeInfo").innerText = "Route reset ✔️";
};
</script>

</body>
</html>
